name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '22'

jobs:
  # ─── Backend: Lint + Unit Tests ───────────────────────────
  backend-lint-and-unit:
    name: Backend - Lint & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: ./backend
        run: npm install

      - name: Run ESLint
        working-directory: ./backend
        run: npm run lint

      - name: Run unit tests with coverage
        working-directory: ./backend
        run: npx jest --config ./test/jest-unitarias.json --coverage --coverageReporters=text --coverageReporters=lcov

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/
          if-no-files-found: ignore
          retention-days: 7

  # ─── Backend: Integration Tests (needs DB) ────────────────
  backend-integration:
    name: Backend - Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: fintech_user
          POSTGRES_PASSWORD: test_password_ci
          POSTGRES_DB: fintech_db_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: ./backend
        run: npm install

      - name: Run integration tests
        working-directory: ./backend
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USER: fintech_user
          DATABASE_PASSWORD: test_password_ci
          DATABASE_NAME: fintech_db_test
          JWT_SECRET: ci-test-jwt-secret-key-min-32-chars
          JWT_EXPIRATION: 24h
          NODE_ENV: test
        run: npx jest --config ./test/jest-integracion.json --forceExit

  # ─── Frontend: Lint + Build + Unit Tests ──────────────────
  frontend-lint-and-unit:
    name: Frontend - Lint, Build & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Run ESLint
        working-directory: ./frontend
        run: npm run lint

      - name: Build application
        working-directory: ./frontend
        run: npm run build

      - name: Run unit tests
        working-directory: ./frontend
        run: npx vitest run

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          if-no-files-found: ignore
          retention-days: 7

  # ─── Docker: Build & Health Check ─────────────────────────
  docker-build:
    name: Docker - Build & Verify
    needs: [backend-lint-and-unit, backend-integration, frontend-lint-and-unit]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      - name: Wait for backend health
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:3001/api > /dev/null 2>&1; then
              echo "Backend is healthy"
              break
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done

      - name: Verify all containers running
        run: |
          docker compose ps
          docker compose ps --format json | jq -e 'select(.State != "running")' && exit 1 || echo "All services running"

      - name: Setup Node.js for E2E
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Install Playwright browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: ./frontend
        run: npx playwright test

      - name: Upload E2E report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Shutdown services
        if: always()
        run: docker compose down -v
