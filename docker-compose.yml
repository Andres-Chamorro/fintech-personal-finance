services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: fintech-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fintech_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fintech_password_2026}
      POSTGRES_DB: ${POSTGRES_DB:-fintech_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fintech_user} -d ${POSTGRES_DB:-fintech_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - fintech-network

  # Backend (NestJS) - Modo desarrollo con hot-reload
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: fintech-backend
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: ${POSTGRES_USER:-fintech_user}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-fintech_password_2026}
      DATABASE_NAME: ${POSTGRES_DB:-fintech_db}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-1h}
      PORT: 3001
      NODE_ENV: development
    ports:
      - "3001:3001"
    volumes:
      - ./backend/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fintech-network
    restart: unless-stopped

  # Frontend (Next.js) - Modo desarrollo con hot-reload
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: fintech-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - backend
    networks:
      - fintech-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  fintech-network:
    driver: bridge
